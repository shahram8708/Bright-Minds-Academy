<article class="pricing-card p-4 h-100" data-template="pricing-card">
  <span class="component-badge component-badge-gold">Plan Badge</span>
  <h3 class="h4 mt-3" data-bind="name">Growth Plan</h3>
  <p class="display-6 mb-1" data-bind="price">$899</p>
  <p class="program-meta mb-3" data-bind="period">per 2 months</p>
  <p class="program-meta" data-bind="sessionInfo">24 sessions | 3 per week | 60 minutes</p>
  <ul class="list-unstyled d-grid gap-2 mb-0" data-bind="features">
    <li class="d-flex gap-2"><i class="bi bi-check-circle-fill text-success" aria-hidden="true"></i><span>Adaptive learning roadmap</span></li>
    <li class="d-flex gap-2"><i class="bi bi-check-circle-fill text-success" aria-hidden="true"></i><span>Biweekly parent check in</span></li>
  </ul>
  <a class="btn btn-brand-primary mt-4" href="./booking.html" data-bind="cta">Choose Plan</a>
</article>
