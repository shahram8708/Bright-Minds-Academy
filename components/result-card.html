<article class="result-card p-4 h-100" data-template="result-card">
  <div class="d-flex justify-content-between align-items-start mb-3">
    <h3 class="h6 mb-0" data-bind="studentInitial">Student AR</h3>
    <span class="premium-badge" data-bind="subject">Mathematics</span>
  </div>

  <p class="mb-2"><strong data-bind="beforeScore">58%</strong> before to <strong data-bind="afterScore">81%</strong> after in <span data-bind="durationWeeks">12 weeks</span>.</p>
  <p class="mb-2 text-muted" data-bind="outcome">Improved concept accuracy and test pacing.</p>
  <p class="small mb-0" data-bind="quote">The weekly practice strategy made difficult chapters manageable.</p>
</article>
