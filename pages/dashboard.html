<!DOCTYPE html>
<html lang="en" data-root-path="../">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parent Dashboard | Bright Minds Academy</title>
  <meta name="description" content="Track session status, progress highlights, and communication visibility through the Bright Minds Academy dashboard foundation." />
  <meta property="og:title" content="Parent Dashboard | Bright Minds Academy" />
  <meta property="og:description" content="Central dashboard experience for progress visibility and parent updates." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.example.com/dashboard" />
  <meta property="og:image" content="../assets/img/hero/og-default.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../design-tokens.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
</head>
<body data-page="dashboard" data-navbar-variant="solid" data-user-role="member">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div data-component="alert-toast"></div>
  <div data-component="navbar"></div>

  <main id="main-content" class="page-main" tabindex="-1">
    <section class="section-space">
      <div class="container">
        <p class="section-label mb-3">Dashboard</p>
        <h1 class="mb-4 reveal">Parent Visibility Dashboard Foundation</h1>

        <section class="dashboard-shell p-4 reveal" aria-label="Dashboard metrics">
          <div class="dashboard-nav pb-3 mb-3">
            <p class="mb-0 text-muted">This dashboard is prepared for upcoming API integrated progress and session modules.</p>
          </div>

          <div class="row g-3">
            <div class="col-md-4">
              <article class="metric-tile">
                <h2 class="h6 mb-1">Stored Leads</h2>
                <p class="display-6 mb-0" data-dashboard-lead-count>0</p>
              </article>
            </div>
            <div class="col-md-4">
              <article class="metric-tile">
                <h2 class="h6 mb-1">Last Lead Timestamp</h2>
                <p class="mb-0" data-dashboard-last-lead>No leads stored yet</p>
              </article>
            </div>
            <div class="col-md-4">
              <article class="metric-tile">
                <h2 class="h6 mb-1">Next Milestone</h2>
                <p class="mb-0">Detailed milestone widgets will be added in later steps.</p>
              </article>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div data-component="cta-strip"></div>
  <div data-component="footer"></div>
  <div data-component="whatsapp-float"></div>
  <div data-component="demo-modal"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../assets/js/pages/dashboard.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
