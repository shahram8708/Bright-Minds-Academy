<!DOCTYPE html>
<html lang="en" data-root-path="../">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog Article | Bright Minds Academy Insights</title>
  <meta name="description" content="Read detailed educational guidance from Bright Minds Academy to help students and parents improve outcomes." />
  <meta property="og:title" content="Blog Article | Bright Minds Academy Insights" />
  <meta property="og:description" content="In depth mentoring insights on study plans, revision systems, and parent support workflows." />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://www.example.com/blog-post" />
  <meta property="og:image" content="../assets/img/blog/blog-cover.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../design-tokens.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/utilities.css" />
</head>
<body data-page="blog-post" data-navbar-variant="solid">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div data-component="alert-toast"></div>
  <div data-component="navbar"></div>

  <main id="main-content" class="page-main" tabindex="-1">
    <article class="section-space" data-blog-article>
      <div class="container container-narrow">
        <p class="section-label mb-3">Blog Article</p>
        <h1 class="mb-3 reveal" data-blog-title>Loading article</h1>
        <p class="text-muted mb-4 reveal" data-blog-meta>Loading details</p>

        <figure class="blog-hero mb-4 reveal" data-blog-hero>
          <div class="placeholder-panel">
            <div class="placeholder-wave mb-2"></div>
            <div class="placeholder-wave"></div>
          </div>
        </figure>

        <div class="blog-summary placeholder-panel reveal" data-blog-summary>
          <h2 class="h5 mb-2">Summary</h2>
          <p class="mb-0" data-blog-excerpt>Loading summary</p>
        </div>

        <div class="d-flex flex-wrap gap-2 mt-3 reveal" data-blog-tags></div>
      </div>
    </article>

    <section class="section-space-sm" data-blog-related-section hidden>
      <div class="container container-narrow">
        <h2 class="h5 mb-3">Related articles</h2>
        <div class="row g-3" data-blog-related aria-live="polite" aria-busy="true"></div>
      </div>
    </section>
  </main>

  <div data-component="cta-strip"></div>
  <div data-component="footer"></div>
  <div data-component="whatsapp-float"></div>
  <div data-component="demo-modal"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../assets/js/pages/blog-post.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
