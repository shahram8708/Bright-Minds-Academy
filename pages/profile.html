<!DOCTYPE html>
<html lang="en" data-root-path="../">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Profile | Bright Minds Academy</title>
  <meta name="description" content="View learner profile foundations including grade context, subject goals, and progress visibility setup." />
  <meta property="og:title" content="Student Profile | Bright Minds Academy" />
  <meta property="og:description" content="Profile experience foundation for student and parent learning information." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://brightmindsacademy.vercel.app/profile" />
  <meta property="og:image" content="../assets/img/hero/og-default.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../design-tokens.css" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
</head>
<body data-page="profile" data-navbar-variant="solid" data-user-role="member">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div data-component="alert-toast"></div>
  <div data-component="navbar"></div>

  <main id="main-content" class="page-main" tabindex="-1">
    <section class="section-space">
      <div class="container">
        <p class="section-label mb-3">Profile</p>
        <h1 class="mb-3 reveal">Student Profile Foundation</h1>

        <div class="dashboard-shell p-4 reveal">
          <div class="row g-3">
            <div class="col-md-6">
              <article class="metric-tile">
                <h2 class="h6">Current Grade</h2>
                <p class="mb-0">Profile data block ready for dynamic binding.</p>
              </article>
            </div>
            <div class="col-md-6">
              <article class="metric-tile">
                <h2 class="h6">Primary Subjects</h2>
                <p class="mb-0">Subject preferences will be rendered from student profile data.</p>
              </article>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div data-component="cta-strip"></div>
  <div data-component="footer"></div>
  <div data-component="whatsapp-float"></div>
  <div data-component="demo-modal"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
